<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIO Tech - Em Desenvolvimento</title>
    
    <style>
        /* Regras de estilo para aplicar o fundo preto e texto branco */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 1.5rem; /* Fonte maior conforme solicitado */
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center; /* Centraliza verticalmente na tela */
            min-height: 100vh; /* Ocupa 100% da altura da janela */
            
            /* AJUSTE PARA O VLIBRAS: Cria uma área de segurança para o widget */
            box-sizing: border-box; 
            padding-right: 80px; /* Impede que o conteúdo cole na direita, onde fica o botão */
        }

        /* Estrutura visual para dividir a tela em duas colunas */
        .container {
            display: flex;
            flex-direction: row; /* Coloca os elementos lado a lado */
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto; /* Centraliza o bloco na página */
            padding: 40px;
            gap: 50px; /* Espaçamento entre o logotipo e o texto */
        }

        .imagem-coluna, .texto-coluna {
            flex: 1; /* Divide o espaço igualmente em 50% para cada lado */
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px; /* Cantos levemente arredondados para acabamento */
        }

        /* Ajuste para telas menores (celulares), empilhando os itens para manter o zoom e a leitura acessível */
        @media (max-width: 768px) {
            body {
                /* No mobile, o botão do VLibras pode atrapalhar embaixo ou na lateral. */
                padding-right: 0;
                padding-bottom: 80px; 
            }
            .container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="container">
            
            <div class="imagem-coluna">
                <img src="logotipoDioTech.jpeg" alt="Logotipo da DIO Tech: A palavra DIO possui a letra I em formato de uma porta entreaberta irradiando luz para a letra Ó que possui a silhueta de um rosto em seu centro olhando para esta porta. Abaixo, o texto: Acessibilidade Digital.">
            </div>

            <div class="texto-coluna">
                <h1><span lang="en">DIO Tech - The Door is Open</span></h1>                
                <p>Nossa plataforma corporativa está em desenvolvimento.</p>
                <p>Em breve, a porta estará aberta para novas soluções em Acessibilidade Digital.</p>
            </div>

        </div>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    </body>
</html>
